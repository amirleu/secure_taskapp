{% extends 'base.html' %}
{% block title %}Delete Task{% endblock %}
{% block content %}
<h2>Delete Task</h2>
<p>Are you sure you want to delete: <strong>{{ task.title }}</strong>?</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'dashboard' %}">Cancel</a>
</form>
{% endblock %}
