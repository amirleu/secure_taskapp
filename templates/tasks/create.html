{% extends 'base.html' %}
{% block title %}Create Task{% endblock %}
{% block content %}
<h2>Create New Task</h2>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create Task</button>
    <a href="{% url 'dashboard' %}">Cancel</a>
</form>
{% endblock %}
