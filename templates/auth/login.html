{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-container">
    <h2>Login</h2>
    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p>No account? <a href="{% url 'register' %}">Register here</a></p>
</div>
{% endblock %}
